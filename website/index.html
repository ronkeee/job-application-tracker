<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Status // Ron Keren</title>
  <link rel="icon" type="image/x-icon" href="/website/assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/website/assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/website/assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/website/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mono: 'JetBrains Mono', 'Courier New', monospace;
      --bg:       #f5f5f4;
      --surface:  #efefed;
      --border:   #d6d6d3;
      --dim:      #a8a8a4;
      --muted:    #737370;
      --text:     #3a3a38;
      --bright:   #111110;

      /* Solid "fill" colors per status — used for the status bar, badges and filter chips */
      --pending:    #ea580c;   --pending-bg:    #ea580c;  --pending-bd:    #ea580c;
      --interview:  #15803d;   --interview-bg:  #15803d;  --interview-bd:  #15803d;
      --rejected:   #78716c;   --rejected-bg:   #78716c;  --rejected-bd:   #78716c;
      --offer:      #7c3aed;   --offer-bg:      #7c3aed;  --offer-bd:      #7c3aed;

      /* Soft variant for the rejection-reason text panel (readable on light bg) */
      --rejected-soft-bg:   #f1f0ee;
      --rejected-soft-text: #57534e;
    }

    html, body { background: var(--bg); }

    body {
      font-family: var(--mono);
      color: var(--text);
      font-size: 12.5px;
      line-height: 1.5;
      min-height: 100vh;
      padding: 40px 56px 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .prompt { color: var(--dim); font-size: 11px; margin-bottom: 0; }
    .prompt span { color: var(--interview); font-weight: 500; }
    .site-title { font-size: 20px; font-weight: 700; color: var(--bright); letter-spacing: -0.3px; }
    .site-title.motivation {
      font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
      font-style: normal;
      font-size: 35px;
      font-weight: 500;
      letter-spacing: -1px;
      line-height: 1.2;
      max-width: 800px;
      margin-top: 24px;
    }
    .site-title .title-line {
      display: block;
      animation: titleFadeUp 0.6s ease both;
    }
    @keyframes titleFadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .site-title .slash { color: var(--dim); font-weight: 300; }
    .header-meta { text-align: right; color: var(--muted); font-size: 11px; line-height: 18px; }
    .header-meta-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; white-space: nowrap; }
    .header-meta-row #sync-line { font-family: var(--mono); color: var(--dim); font-size: 11px; }
    .header-meta-row .meta-sep { color: var(--border); }

    /* ── Status breakdown bar ── */
    .activity-section {
      padding: 0;
      margin-bottom: 20px;
    }
    .activity-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .status-bar {
      display: flex;
      width: 100%;
      height: 80px;
      gap: 3px;
    }
    .status-bar .seg {
      height: 100%;
      border-radius: 8px;
      border: 1px solid;
      padding: 8px 10px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      overflow: hidden;
      transform-origin: left center;
    }
    .status-bar .seg .seg-name {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
      white-space: nowrap;
    }
    .status-bar .seg .seg-count {
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }
    .status-bar .seg.s-interview { background: var(--interview-bg); border-color: var(--interview-bd); color: #fff; }
    .status-bar .seg.s-offer     { background: var(--offer-bg);     border-color: var(--offer-bd);     color: #fff; }
    .status-bar .seg.s-pending   { background: var(--pending-bg);   border-color: var(--pending-bd);   color: #fff; }
    .status-bar .seg.s-rejected  { background: var(--rejected-bg);  border-color: var(--rejected-bd);  color: #fff; }

    /* ── Intro animations ── */
    @keyframes segGrowIn {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }
    .status-bar .seg {
      animation: segGrowIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes rowSlideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    tbody tr.data-row, tbody tr.expand-row {
      animation: rowSlideIn 0.55s ease both;
    }
    tbody tr.data-row.no-anim, tbody tr.expand-row.no-anim {
      animation: none;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: white;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.12s;
    }
    .chip:hover { border-color: var(--dim); color: var(--text); }
    .chip.chip-all.active { background: var(--bright); color: white; border-color: var(--bright); }

    /* Status filter chips — filled with the status color */
    .chip.chip-interview { background: var(--interview-bg); color: #fff; border-color: var(--interview-bd); }
    .chip.chip-pending   { background: var(--pending-bg);   color: #fff; border-color: var(--pending-bd); }
    .chip.chip-rejected  { background: var(--rejected-bg);  color: #fff; border-color: var(--rejected-bd); }
    .chip.chip-offer     { background: var(--offer-bg);     color: #fff; border-color: var(--offer-bd); }
    .chip[class*="chip-"]:not(.chip-all) { opacity: 0.4; }
    .chip[class*="chip-"]:not(.chip-all):hover { opacity: 0.7; color: #fff; }
    .chip[class*="chip-"]:not(.chip-all).active { opacity: 1; box-shadow: 0 0 0 2px var(--bright) inset; }

    .filter-divider { width: 1px; height: 20px; background: var(--border); }

    .table-toolbar {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .search-toggle, .filter-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border: none;
      background: none;
      color: var(--muted);
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.12s;
      flex-shrink: 0;
    }
    .search-toggle:hover, .filter-toggle:hover { color: var(--text); }
    .search-toggle svg, .filter-toggle svg { width: 16px; height: 16px; pointer-events: none; }

    .filters { display: none; }
    .filters.open {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      z-index: 10;
      white-space: nowrap;
    }

    .search-popover { display: none; }
    .search-popover.open {
      display: flex;
      align-items: center;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 8px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      z-index: 10;
      white-space: nowrap;
    }
    .search-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-input {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 26px 4px 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text);
      border-radius: 999px;
      outline: none;
      width: 180px;
    }
    .search-input:focus { border-color: var(--dim); }
    .search-clear {
      display: none;
      position: absolute;
      right: 6px;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: none;
      background: none;
      padding: 0;
      color: var(--muted);
      cursor: pointer;
      border-radius: 50%;
    }
    .search-clear svg { width: 11px; height: 11px; pointer-events: none; }
    .search-clear:hover { color: var(--text); }
    .search-clear.visible { display: flex; }

    .date-input {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text);
      border-radius: 999px;
      outline: none;
    }
    .date-input:focus { border-color: var(--dim); }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .col-company { width: 14%; }
    .col-role { width: 18%; }
    th:nth-child(3), th:nth-child(4), .col-date { width: 11%; }
    .col-last { width: 36%; }
    .col-status { width: 9%; }
    thead tr { border-bottom: 1px solid var(--border); }
    thead th {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 14px;
      text-align: left;
      white-space: nowrap;
    }
    thead th:first-child { padding-left: 8px; border-radius: 0; }
    thead th:last-child { text-align: right; padding-right: 8px; }
    thead th.sortable { cursor: pointer; user-select: none; transition: color 0.1s; }
    thead th.sortable:hover { color: var(--text); }
    thead th.sortable .sort-arrow { display: inline-block; margin-left: 3px; opacity: 0.4; font-size: 9px; }
    thead th.sortable.active { color: var(--bright); }
    thead th.sortable.active .sort-arrow { opacity: 1; }

    tbody tr.data-row {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr.data-row:hover { background: var(--surface); }
    tbody tr.data-row.expanded { border-bottom: none; background: var(--surface); }
    tbody tr.expand-row { display: none; border-bottom: 1px solid var(--border); background: var(--surface); }
    tbody tr.expand-row.open { display: table-row; }

    tbody td { padding: 13px 14px; vertical-align: middle; }
    tbody td:first-child { padding-left: 8px; }
    tbody td:last-child { padding-right: 8px; }

    .col-company { font-weight: 700; color: var(--bright); font-size: 13px; white-space: nowrap; }
    .col-role { color: var(--text); font-size: 12px; }
    .col-date { font-size: 11px; white-space: nowrap; }
    .date-val { color: var(--text); }
    .col-last { font-size: 11px; max-width: 200px; }
    .last-subj { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; display: block; }
    .last-date { font-size: 10px; color: var(--dim); margin-top: 1px; }
    .col-status { text-align: right; }

    /* ── Expanded content ── */
    .expand-cell { padding: 0 !important; }
    .expand-inner {
      padding: 16px 20px 20px;
      border-top: 1px dashed var(--border);
      margin: 0 0;
    }
    .expand-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }
    .expand-grid > div {
      flex: 1 1 200px;
      min-width: 200px;
    }
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .expand-col-preview {
      flex: 1 1 40%;
      max-width: 40%;
    }
    .expand-col-preview .link-list {
      margin-top: 10px;
    }
    .link-list a {
      font-size: 11.5px;
      color: var(--text);
      text-decoration: none;
      line-height: 1.3;
      word-break: break-word;
      transition: color 0.12s;
    }
    .link-list a:hover {
      color: var(--bright);
      text-decoration: underline;
    }
    .link-list a::after {
      content: ' ›';
      color: var(--bright);
      font-weight: 700;
    }
    .expand-block-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--bright);
      margin-bottom: 6px;
    }
    .expand-body {
      font-size: 11.5px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .rejection-box {
      font-size: 11.5px;
      color: var(--rejected-soft-text);
      line-height: 1.7;
    }
    .rejection-box .rj-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      display: block;
    }

    /* ── Status badge — pill, no dot ── */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .badge-pending   { background: var(--pending-bg);   color: #fff; }
    .badge-interview { background: var(--interview-bg); color: #fff; }
    .badge-rejected  { background: var(--rejected-bg);  color: #fff; }
    .badge-offer     { background: var(--offer-bg);     color: #fff; }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      display: flex;
      justify-content: space-between;
      color: var(--dim);
      font-size: 11px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .empty { padding: 40px 0; color: var(--muted); font-size: 12px; }
    .no-results { padding: 24px 0; color: var(--muted); font-size: 12px; }

    /* ── Sync button ── */
    .sync-btn {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: normal;
      text-transform: none;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.12s, color 0.12s;
      margin-top: 0;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .sync-btn:hover { border-color: var(--dim); color: var(--bright); }
    .sync-btn:disabled { cursor: default; opacity: 0.7; }
    .sync-btn .spinner {
      width: 11px;
      height: 11px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      display: none;
      animation: spin 0.7s linear infinite;
    }
    .sync-btn.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sync-toast {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 14px;
    }
    .sync-toast.error { color: var(--rejected); }
    .sync-toast.success { color: var(--interview); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header-top">
    <div>
      <div class="prompt"><span id="prompt-handle">ron@keren</span>:~/job-search $</div>
      <div class="site-title" id="site-title" dir="auto">Application Status <span class="slash">//</span> <span id="site-title-name">Ron Keren</span></div>
    </div>
    <div class="header-meta">
      <div class="header-meta-row">
        <span id="sync-line">—</span>
        <button class="sync-btn" id="sync-btn" onclick="syncNow()">
          <span class="spinner"></span>
          <span class="sync-label" id="sync-label">Sync Now</span>
        </button>
      </div>
      <div class="sync-toast" id="sync-toast"></div>
    </div>
  </div>

  <!-- Status breakdown -->
  <div class="activity-section">
    <div class="activity-title" id="activity-title"></div>
    <div class="status-bar" id="status-bar"></div>
  </div>

  <!-- Table toolbar -->
  <div class="table-toolbar">
    <div class="search-popover" id="search-popover">
      <div class="search-input-wrap">
        <input type="text" class="search-input" id="search-input" placeholder="Search company..." />
        <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Clear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    </div>
    <button class="search-toggle" id="search-toggle" onclick="toggleSearch()" title="Search">
      <svg id="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
    <div class="filters" id="filters-row">
      <div class="filter-chips" id="status-filters"></div>
      <div class="filter-divider"></div>
      <span class="filter-label">From</span>
      <input type="date" class="date-input" id="date-from" />
      <span class="filter-label">To</span>
      <input type="date" class="date-input" id="date-to" />
    </div>
    <button class="filter-toggle" id="filter-toggle" onclick="toggleFilters()" title="Filters">
      <svg id="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="6" y1="12" x2="18" y2="12"></line><line x1="9" y1="18" x2="15" y2="18"></line></svg>
    </button>
  </div>

  <table>
    <thead>
      <tr id="table-head-row">
        <th>Company</th>
        <th>Role</th>
        <th class="sortable" data-sort="dateApplied" onclick="setSort('dateApplied')">Sent <span class="sort-arrow"></span></th>
        <th class="sortable" data-sort="lastReply" onclick="setSort('lastReply')">Received <span class="sort-arrow"></span></th>
        <th>Last Email</th>
        <th class="sortable" data-sort="status" onclick="setSort('status')" style="text-align:right">Status <span class="sort-arrow"></span></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <div class="footer">
    <div id="footer-left">[Ron.Keren] // Active Job Search</div>
    <div id="footer-right"></div>
  </div>

  <script>
    const STATUS_LABELS = { offer:'Offer', interview:'Interview', pending:'Pending', rejected:'Declined' };
    const STATUS_ORDER  = ['offer','interview','pending','rejected'];
    const STAT_CLS = { offer:'c-offer', interview:'c-interview', pending:'c-pending', rejected:'c-rejected' };

    let allApps = [];
    let activeStatus = 'all';
    let dateFrom = null, dateTo = null;
    let searchQuery = '';

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' });
    }

    // Build a small set of "do your homework" links for a company — generic
    // search/lookup URLs that don't require any extra data per application.
    function buildResearchLinks(company) {
      const q = encodeURIComponent(company);
      return [
        { url: `https://www.google.com/search?q=${q}+company+culture+product+design+team`, label: 'Company & team overview' },
        { url: `https://www.glassdoor.com/Search/results.htm?keyword=${q}`, label: 'Glassdoor reviews & interview tips' },
        { url: `https://www.linkedin.com/search/results/companies/?keywords=${q}`, label: 'LinkedIn — company & employees' },
        { url: `https://www.google.com/search?q=${q}+product+designer+interview+questions`, label: 'Interview questions & process' },
      ];
    }

    function badge(status) {
      return `<span class="badge badge-${status}">${STATUS_LABELS[status] || status}</span>`;
    }

    // Intro animation should only play once, on initial load — not on
    // every re-render triggered by expand/collapse, sort, or filter changes.
    let tableAnimated = false;
    let sortKey = 'status';
    let sortDir = 'asc';
    let expandedIndex = null;

    const STATUS_SORT_RANK = { offer: 0, interview: 1, pending: 2, rejected: 3 };

    function filtered() {
      const apps = allApps.filter(a => {
        if (activeStatus !== 'all' && a.status !== activeStatus) return false;
        if (dateFrom && a.dateApplied < dateFrom) return false;
        if (dateTo && a.dateApplied > dateTo) return false;
        if (searchQuery && !a.company.toLowerCase().includes(searchQuery)) return false;
        return true;
      });

      const dir = sortDir === 'asc' ? 1 : -1;
      apps.sort((a, b) => {
        let av, bv;
        if (sortKey === 'status') {
          av = STATUS_SORT_RANK[a.status] ?? 99;
          bv = STATUS_SORT_RANK[b.status] ?? 99;
        } else {
          av = a[sortKey] || '';
          bv = b[sortKey] || '';
        }
        if (av < bv) return -1 * dir;
        if (av > bv) return 1 * dir;
        return 0;
      });
      return apps;
    }

    function setSort(key) {
      if (sortKey === key) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortKey = key;
        sortDir = key === 'status' ? 'asc' : 'desc';
      }
      expandedIndex = null;
      renderTable();
    }

    function renderSortIndicators() {
      document.querySelectorAll('#table-head-row th.sortable').forEach(th => {
        const key = th.dataset.sort;
        const arrow = th.querySelector('.sort-arrow');
        if (key === sortKey) {
          th.classList.add('active');
          arrow.textContent = sortDir === 'asc' ? '▲' : '▼';
        } else {
          th.classList.remove('active');
          arrow.textContent = '';
        }
      });
    }

    function renderTable() {
      const apps = filtered();
      const tbody = document.getElementById('table-body');

      renderSortIndicators();

      if (!apps.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="no-results">No applications match the current filters.</td></tr>`;
        return;
      }

      tbody.innerHTML = apps.map((a, i) => {
        const hasBody = a.bodyExcerpt && a.bodyExcerpt.trim().length > 10;
        const hasRejection = a.status === 'rejected' && a.rejectionReason;
        const hasLinks = a.links && a.links.length > 0;
        const researchLinks = buildResearchLinks(a.company);
        const isOpen = expandedIndex === i;
        const expandContent = hasBody ? `
          <tr class="expand-row${isOpen ? ' open' : ''}${tableAnimated ? ' no-anim' : ''}" id="expand-${i}">
            <td class="expand-cell" colspan="6">
              <div class="expand-inner">
                <div class="expand-grid">
                  <div class="expand-col-preview">
                    <div class="expand-block-label">Last Email Preview</div>
                    <div class="expand-body">${escHtml(a.bodyExcerpt || '').slice(0, 600)}</div>
                    ${hasLinks ? `
                    <div class="link-list">
                      ${a.links.map(l => `<a href="${escHtml(l.url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${escHtml(l.label)}</a>`).join('')}
                    </div>` : ''}
                  </div>
                  ${hasRejection ? `
                  <div>
                    <div class="expand-block-label">Rejection Reason</div>
                    <div class="rejection-box">
                      <span class="rj-label">Why they declined</span>
                      ${escHtml(a.rejectionReason)}
                    </div>
                  </div>` : ''}
                  <div>
                    <div class="expand-block-label">Prep &amp; Research</div>
                    <div class="link-list">
                      ${researchLinks.map(l => `<a href="${escHtml(l.url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${escHtml(l.label)}</a>`).join('')}
                    </div>
                  </div>
                </div>
              </div>
            </td>
          </tr>` : '';

        return `
          <tr class="data-row${isOpen ? ' expanded' : ''}${tableAnimated ? ' no-anim' : ''}" onclick="toggle(${i})" id="row-${i}" style="animation-delay:${0.3 + i * 0.06}s">
            <td class="col-company">${a.company}</td>
            <td class="col-role">${a.role}</td>
            <td class="col-date">
              <span class="date-val">${fmtDate(a.dateApplied)}</span>
            </td>
            <td class="col-date">
              <span class="date-val">${fmtDate(a.lastReply)}</span>
            </td>
            <td class="col-last">
              ${a.lastReplySubject
                ? `<span class="last-subj">${escHtml(a.lastReplySubject)}</span><span class="last-date">${fmtDate(a.lastReply)}</span>`
                : '<span style="color:var(--dim)">—</span>'}
            </td>
            <td class="col-status">${badge(a.status)}</td>
          </tr>
          ${expandContent}`;
      }).join('');

      const active = apps.filter(a => a.status !== 'rejected').length;
      const rejected = apps.filter(a => a.status === 'rejected').length;
      document.getElementById('footer-right').textContent =
        `${active} active · ${rejected} declined · synced from Gmail`;

      tableAnimated = true;
    }

    function toggle(i) {
      const exp = document.getElementById(`expand-${i}`);
      if (!exp) return;
      expandedIndex = expandedIndex === i ? null : i;
      renderTable();
    }

    function escHtml(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Display order for the status breakdown bar (left to right)
    const STATUS_BAR_ORDER = ['interview', 'offer', 'pending', 'rejected'];

    function renderActivity(apps) {
      const counts = {};
      apps.forEach(a => { counts[a.status] = (counts[a.status] || 0) + 1; });

      document.getElementById('activity-title').textContent =
        `${apps.length} Application${apps.length !== 1 ? 's' : ''}`;

      const present = STATUS_BAR_ORDER.filter(s => counts[s] > 0);

      document.getElementById('status-bar').innerHTML = present.map((s, i) => `
        <div class="seg s-${s}" style="flex:${counts[s]}; animation-delay:${i * 0.12}s" title="${STATUS_LABELS[s]}: ${counts[s]}">
          <div class="seg-count">${counts[s]}</div>
          <div class="seg-name">${STATUS_LABELS[s]}</div>
        </div>
      `).join('');
    }

    function renderFilters(apps) {
      const statuses = ['all', ...STATUS_ORDER.filter(s => apps.some(a => a.status === s))];
      document.getElementById('status-filters').innerHTML = statuses.map(s =>
        `<button class="chip chip-${s} ${s === activeStatus ? 'active' : ''}" onclick="setStatus('${s}')">
          ${s === 'all' ? 'All' : STATUS_LABELS[s]}
        </button>`
      ).join('');
    }

    const FILTER_ICON = `<line x1="3" y1="6" x2="21" y2="6"></line><line x1="6" y1="12" x2="18" y2="12"></line><line x1="9" y1="18" x2="15" y2="18"></line>`;
    const SEARCH_ICON = `<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>`;
    const CLOSE_ICON = `<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>`;

    function toggleFilters(forceClose) {
      const row = document.getElementById('filters-row');
      const icon = document.getElementById('filter-icon');
      const isOpen = forceClose ? false : !row.classList.contains('open');
      row.classList.toggle('open', isOpen);
      icon.innerHTML = isOpen ? CLOSE_ICON : FILTER_ICON;
    }

    function toggleSearch(forceClose) {
      const popover = document.getElementById('search-popover');
      const icon = document.getElementById('search-icon');
      const isOpen = forceClose ? false : !popover.classList.contains('open');
      popover.classList.toggle('open', isOpen);
      icon.innerHTML = isOpen ? CLOSE_ICON : SEARCH_ICON;
      if (isOpen) {
        const input = document.getElementById('search-input');
        document.getElementById('search-clear').classList.toggle('visible', input.value.length > 0);
        input.focus();
      }
    }

    document.addEventListener('click', e => {
      const path = e.composedPath();
      if (!path.some(el => el.id === 'search-popover' || el.id === 'search-toggle')) {
        toggleSearch(true);
      }
      if (!path.some(el => el.id === 'filters-row' || el.id === 'filter-toggle')) {
        toggleFilters(true);
      }
    });

    function setStatus(s) {
      activeStatus = s;
      renderFilters(allApps);
      renderTable();
    }

    // Builds an encouraging, ever-changing headline based on current stats
    function buildMotivation(apps) {
      const total = apps.length;
      const interviews = apps.filter(a => a.status === 'interview').length;
      const offers = apps.filter(a => a.status === 'offer').length;
      const pending = apps.filter(a => a.status === 'pending' || a.status === 'applied').length;
      const declined = apps.filter(a => a.status === 'rejected').length;

      const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

      let pool;
      if (offers > 0) {
        pool = [
          `You've got ${offers} job offer${offers !== 1 ? 's' : ''} on the table! Huge congrats, ${total} applications led you here 🎉`,
          `${offers} offer${offers !== 1 ? 's' : ''} in hand out of ${total} applications. All that effort just paid off 🥳`,
          `Offer${offers !== 1 ? 's' : ''} secured: ${offers}. Time to celebrate — ${total} applications and counting 🍾`,
        ];
      } else if (interviews > 0) {
        pool = [
          `${interviews} interview${interviews !== 1 ? 's' : ''} in progress out of ${total} applications. You're building momentum, keep it up 💪`,
          `${interviews} conversation${interviews !== 1 ? 's' : ''} lined up out of ${total} applications. Go show them what you've got 🔥`,
          `${interviews} interview${interviews !== 1 ? 's' : ''} on the calendar. ${total} applications sent, and it's working 🎯`,
          `Momentum check: ${interviews} interview${interviews !== 1 ? 's' : ''} from ${total} applications. Keep that energy going ⚡`,
        ];
        if (pending > 0) {
          pool.push(
            `${interviews} interview${interviews !== 1 ? 's' : ''} locked in, and ${pending} more application${pending !== 1 ? 's' : ''} still cooking. Let's see what they bring 👀`,
            `${interviews} interview${interviews !== 1 ? 's' : ''} underway, ${pending} application${pending !== 1 ? 's' : ''} still in the oven. Plenty more could turn into this 👀`,
          );
        }
      } else if (pending > 0) {
        pool = [
          `${total} applications sent, ${pending} still awaiting a reply. Great consistency, keep sending those CVs 🚀`,
          `${pending} application${pending !== 1 ? 's' : ''} out there waiting to hear back. Stay patient, stay applying 🌱`,
          `${total} applications and counting. The right reply is just a matter of time, keep going 🚀`,
          `${pending} in the pipeline, ${total} sent overall. Consistency beats intensity, keep it steady 🧭`,
        ];
      } else if (declined > 0 && total > 0) {
        pool = [
          `${total} applications sent so far. Every "no" gets you closer to the right "yes", keep going 💪`,
          `${declined} answer${declined !== 1 ? 's' : ''} didn't land, but ${total} applications shows real persistence. Onward 🌤`,
          `Setbacks happen. ${total} applications in, and you're still in the game — keep pushing 🔥`,
        ];
      } else if (total > 0) {
        pool = [
          `${total} applications sent so far. Every day you keep going is a step forward, keep it up 💪`,
          `${total} application${total !== 1 ? 's' : ''} down. Strong start — momentum builds from here 🚀`,
          `${total} applications sent. Small steps add up, keep the streak going 🌱`,
        ];
      } else {
        pool = [
          `No applications yet. Today's a great day to send your first one 🚀`,
          `Your job search starts here. Sync your inbox and let's get moving 💪`,
        ];
      }

      return pick(pool);
    }

    function render(data) {
      allApps = data.applications || [];
      // "Applied" is folded into "Pending" — both mean "waiting to hear back"
      allApps.forEach(a => { if (a.status === 'applied') a.status = 'pending'; });
      const fetched = new Date(data.lastFetched);
      document.getElementById('sync-line').textContent =
        `Last sync: ${fetched.toLocaleDateString('en-GB', {day:'numeric',month:'short'})} ${fetched.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;

      const titleEl = document.getElementById('site-title');
      const motivation = buildMotivation(allApps);
      // Split into two lines at the first sentence break so each line can
      // animate in sequentially (fade up).
      const splitAt = motivation.indexOf('. ');
      let line1 = motivation, line2 = '';
      if (splitAt !== -1) {
        line1 = motivation.slice(0, splitAt + 1);
        line2 = motivation.slice(splitAt + 2);
      }
      titleEl.innerHTML = line2
        ? `<span class="title-line">${escHtml(line1)}</span><span class="title-line" style="animation-delay:0.15s">${escHtml(line2)}</span>`
        : `<span class="title-line">${escHtml(line1)}</span>`;
      titleEl.classList.add('motivation');

      renderActivity(allApps);
      renderFilters(allApps);
      renderTable();

      // Date filter events
      document.getElementById('date-from').addEventListener('change', e => {
        dateFrom = e.target.value || null;
        renderTable();
      });
      document.getElementById('date-to').addEventListener('change', e => {
        dateTo = e.target.value || null;
        renderTable();
      });
    }

    function loadConfig() {
      return fetch('/api/config')
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(config => {
          if (config.handle) document.getElementById('prompt-handle').textContent = config.handle;
          if (config.displayName) {
            document.getElementById('site-title-name').textContent = config.displayName;
            document.title = `Application Status // ${config.displayName}`;
            document.getElementById('footer-left').textContent = `[${config.displayName.replace(/\s+/g, '.')}] // Active Job Search`;
          }
        })
        .catch(() => {});
    }

    function loadData() {
      return fetch(`/applications.json?t=${Date.now()}`)
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(render)
        .catch(() => {
          document.getElementById('table-body').innerHTML =
            `<tr><td colspan="7" class="empty">Run <code>bun gmail_fetcher.js</code> to sync.</td></tr>`;
        });
    }

    let syncTimer = null;
    let syncSeconds = 0;
    let toastTimer = null;

    async function syncNow() {
      const btn = document.getElementById('sync-btn');
      const label = document.getElementById('sync-label');
      const toast = document.getElementById('sync-toast');

      if (btn.classList.contains('loading')) return;

      btn.classList.add('loading');
      btn.disabled = true;
      toast.className = 'sync-toast';
      toast.textContent = '';
      clearTimeout(toastTimer);
      syncSeconds = 0;
      label.textContent = `Syncing... 0s`;
      syncTimer = setInterval(() => {
        syncSeconds += 1;
        label.textContent = `Syncing... ${syncSeconds}s`;
      }, 1000);

      try {
        const res = await fetch('/api/sync', { method: 'POST' });
        const data = await res.json();
        clearInterval(syncTimer);

        if (!res.ok || !data.ok) {
          toast.className = 'sync-toast error';
          toast.textContent = `Sync failed: ${data.error || 'unknown error'}`;
          label.textContent = 'Sync Now';
        } else {
          toast.className = 'sync-toast success';
          toast.textContent = `Synced ${data.count ?? ''} applications in ${data.duration}s`;
          label.textContent = 'Sync Now';
          await loadData();
        }
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.className = 'sync-toast';
          toast.textContent = '';
        }, 5000);
      } catch (err) {
        clearInterval(syncTimer);
        toast.className = 'sync-toast error';
        toast.textContent = `Sync failed: ${err.message}`;
        label.textContent = 'Sync Now';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.className = 'sync-toast';
          toast.textContent = '';
        }, 5000);
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function clearSearch() {
      const input = document.getElementById('search-input');
      input.value = '';
      searchQuery = '';
      document.getElementById('search-clear').classList.remove('visible');
      expandedIndex = null;
      renderTable();
      input.focus();
    }

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim().toLowerCase();
      document.getElementById('search-clear').classList.toggle('visible', e.target.value.length > 0);
      expandedIndex = null;
      renderTable();
    });

    loadConfig();
    loadData();
  </script>
</body>
</html>
